<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <title>Менеджер миллиона элементов1</title>
</head>
<body>
    <div id="root"></div>
    
    <div id="loading-splash" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
        transition: opacity 0.5s ease;
    ">
        <div style="
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        "></div>
        <h2 style="margin: 0 0 10px 0; text-align: center;">Менеджер миллиона элементов</h2>
        <p style="opacity: 0.8; margin: 0; text-align: center;">Загрузка приложения...</p>
    </div>
    
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow-x: hidden;
        }
        
        * {
            box-sizing: border-box;
        }
    </style>
    
    <script>
        // Скрываем экран загрузки когда приложение загружено
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('loading-splash');
                splash.style.opacity = '0';
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
